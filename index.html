  {cat:"Gesetze & Verordnungen",

   a:0,
   e:"§3 GEG definiert 'Baudenkmal' als ein nach Landesrecht geschütztes Gebäude oder eine nach Landesrecht geschützte Gebäudemehrheit – also eine rein landesrechtliche Schutzqualität."},

  {cat:"Gesetze & Verordnungen",

  {cat:"Gesetze & Verordnungen",

// ── Engine ─────────────────────────────────────────────────────────────────
let order = [], cur = 0, score = 0;
let catScores = {}, catTotals = {};
let answered = false;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function init(){
  order = shuffle([...Array(QUESTIONS.length).keys()]);
  cur = 0; score = 0;
  catScores = {}; catTotals = {};
  QUESTIONS.forEach(q=>{
    if(!catTotals[q.cat]) catTotals[q.cat]=0;
    catTotals[q.cat]++;
  });
  document.getElementById('quiz-container').innerHTML = `
    <div class="header">
      <h1>Energieberatung für Baudenkmäler – Tag 3</h1>
      <div class="sub">Referentin: Dr.-Ing. Diana Wiedemann · Campus-EW GmbH</div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar" style="width:1%"></div></div>
      <div class="progress-label" id="progress-label">Frage 1 von ${QUESTIONS.length}</div>
    </div>
    <div class="body" id="quiz-body">
      <div class="category-tag" id="cat-tag"></div>
      <div class="question" id="question-text"></div>
      <div class="multi-hint" id="multi-hint">☑ Mehrfachauswahl – wählen Sie alle zutreffenden Antworten und bestätigen Sie dann.</div>
      <div class="options" id="options"></div>
      <button class="confirm-btn" id="confirm-btn" onclick="confirmMulti()" disabled>Auswahl bestätigen</button>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Weiter →</button>
    </div>
    <div class="footer">Tag 3 · Referentin: Dr.-Ing. Diana Wiedemann · Campus-EW GmbH, Aachen</div>`;
  showQuestion();
}

function isMulti(q){ return Array.isArray(q.a); }

function showQuestion(){
  answered = false;
  const idx = order[cur];
  const q = QUESTIONS[idx];
  const letters = ['A','B','C','D'];
  const pct = Math.round((cur/QUESTIONS.length)*100);

  document.getElementById('progress-bar').style.width = Math.max(1,pct)+'%';
  document.getElementById('progress-label').textContent = `Frage ${cur+1} von ${QUESTIONS.length}`;
  document.getElementById('cat-tag').textContent = q.cat;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('multi-hint').style.display = isMulti(q) ? 'block' : 'none';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const multi = isMulti(q);
  document.getElementById('confirm-btn').style.display = multi ? 'block' : 'none';
  document.getElementById('confirm-btn').disabled = true;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectOption(btn, i);
    optDiv.appendChild(btn);
  });
}

function selectOption(btn, idx){
  if(answered) return;
  const q = QUESTIONS[order[cur]];
  const multi = isMulti(q);
  const allBtns = document.querySelectorAll('.option');

  if(!multi){
    allBtns.forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    evaluateSingle(idx);
  } else {
    btn.classList.toggle('selected');
    const selCount = document.querySelectorAll('.option.selected').length;
    document.getElementById('confirm-btn').disabled = selCount === 0;
  }
}

function evaluateSingle(chosen){
  answered = true;
  const q = QUESTIONS[order[cur]];
  const allBtns = document.querySelectorAll('.option');
  allBtns.forEach(b => b.disabled = true);

  const correct = chosen === q.a;
  allBtns[q.a].classList.add('correct');
  if(!correct) allBtns[chosen].classList.add('wrong');

  if(correct){ score++; trackCat(q.cat, true); } else { trackCat(q.cat, false); }
  showFeedback(correct, q.e);
  document.getElementById('next-btn').style.display = 'block';
}

function confirmMulti(){
  answered = true;
  const q = QUESTIONS[order[cur]];
  const allBtns = document.querySelectorAll('.option');
  const correct = new Set(q.a);
  const selected = new Set();
  allBtns.forEach((b,i) => { if(b.classList.contains('selected')) selected.add(i); });
  allBtns.forEach(b => b.disabled = true);
  document.getElementById('confirm-btn').disabled = true;

  let allOk = true;
  allBtns.forEach((b,i) => {
    if(correct.has(i)){ b.classList.remove('selected'); b.classList.add('correct'); }
    else if(selected.has(i)){ b.classList.remove('selected'); b.classList.add('wrong'); allOk=false; }
  });
  correct.forEach(i => { if(!selected.has(i)) allOk = false; });

  if(allOk){ score++; trackCat(q.cat, true); } else { trackCat(q.cat, false); }
  showFeedback(allOk, q.e);
  document.getElementById('next-btn').style.display = 'block';
}

function trackCat(cat, ok){
  if(!catScores[cat]) catScores[cat] = 0;
  if(ok) catScores[cat]++;
}

function showFeedback(ok, explanation){
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');
  fb.innerHTML = `<div class="feedback-icon">${ok ? '✓ Richtig!' : '✗ Leider falsch.'}</div>${explanation}`;
  fb.style.display = 'block';
}

function nextQuestion(){
  cur++;
  if(cur >= QUESTIONS.length){ showResults(); return; }
  showQuestion();
}

function showResults(){
  const pct = Math.round((score/QUESTIONS.length)*100);
  let catHTML = '';
  Object.keys(catTotals).forEach(cat => {
    const s = catScores[cat] || 0;
    const t = catTotals[cat];
    const p = Math.round((s/t)*100);
    catHTML += `<div class="cat-row">
      <div class="cat-name">${cat}</div>
      <div class="cat-bar-bg"><div class="cat-bar" style="width:${p}%"></div></div>
      <div class="cat-pct">${s}/${t} (${p} %)</div>
    </div>`;
  });
  document.getElementById('quiz-container').innerHTML = `
    <div class="results">
      <h2>Ergebnis</h2>
      <div class="score-big">${pct} %</div>
      <div class="score-label">${score} von ${QUESTIONS.length} Fragen richtig beantwortet</div>
      <div class="cat-results">${catHTML}</div>
      <button class="restart-btn" onclick="init()">Quiz wiederholen</button>
    </div>
    <div class="footer">Tag 3 · Referentin: Dr.-Ing. Diana Wiedemann · Campus-EW GmbH, Aachen</div>`;
}

init();
</script>
</body>
</html>
